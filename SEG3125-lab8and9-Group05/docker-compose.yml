services:
  postgres:
    image: postgres:16-alpine
    container_name: notehub_postgres
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: notehub_admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: notehub_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notehub_admin"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
